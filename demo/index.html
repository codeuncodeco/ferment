<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fermenti UI - Demo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: { primary: '#FAF7F2', secondary: '#F2ECE3', card: '#FFFFFF' },
            text: { primary: '#2C1810', secondary: '#6B5344', muted: '#A89485' },
            accent: { brine: '#C4A35A', ferment: '#D4553A', culture: '#7B8F3A', aged: '#8B6B4A' },
            tier: { beginner: '#8EAE68', seasoned: '#C4A35A', ambitious: '#D4813A', advanced: '#D4553A', master: '#6B3A5C' },
            dark: { primary: '#1A1410', secondary: '#241E18', card: '#2E2620', text: '#F2ECE3', 'text-secondary': '#C4B5A3' }
          },
          fontFamily: {
            serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          borderRadius: { '2xl': '16px', xl: '12px' },
          transitionTimingFunction: { ferment: 'cubic-bezier(0.4, 0, 0.2, 1)' },
        }
      }
    }
  </script>

  <!-- Fermenti CSS -->
  <link rel="stylesheet" href="../src/css/fermenti.css" />

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
    }
  </style>
</head>
<body class="bg-bg-primary dark:bg-dark-primary text-text-primary dark:text-dark-text min-h-screen transition-colors duration-300">
  <div id="app">
    <demo-app></demo-app>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
